aid: netreveal
name: Netreveal
description: >-
  Netreveal is BAE Systems Applied Intelligence's financial crime detection
  and prevention platform, providing analytics for anti-money laundering,
  fraud detection, sanctions screening, and regulatory compliance for banks
  and financial institutions. Netreveal does not currently publish public
  developer-facing APIs; integrations are typically delivered through
  customer engagements.
